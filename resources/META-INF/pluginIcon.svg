<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <!-- Main gradient - Nord Frost blues -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5E81AC"/>
      <stop offset="100%" style="stop-color:#88C0D0"/>
    </linearGradient>
    <!-- Letter shine -->
    <linearGradient id="letter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECEFF4"/>
      <stop offset="100%" style="stop-color:#D8DEE9"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle with Nord blue gradient -->
  <circle cx="20" cy="20" r="19" fill="url(#bg)"/>
  
  <!-- Inner circle for depth -->
  <circle cx="20" cy="20" r="17" fill="none" stroke="#ECEFF4" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Letter R - Modern sans-serif style -->
  <g fill="url(#letter)">
    <!-- Vertical bar -->
    <rect x="12" y="11" width="3.5" height="18" rx="1"/>
    <!-- Top horizontal -->
    <rect x="12" y="11" width="10" height="3.5" rx="1"/>
    <!-- Bowl of R -->
    <path d="M 15.5 11 L 21 11 C 23.5 11 25 12.5 25 15 C 25 17.5 23.5 19 21 19 L 15.5 19 Z" 
          fill="none" stroke="url(#letter)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Leg of R -->
    <rect x="20" y="19" width="3.5" height="10" rx="1" 
          transform="rotate(25 20 19)"/>
  </g>
  
  <!-- Subtle outer glow -->
  <circle cx="20" cy="20" r="19" fill="none" stroke="#88C0D0" stroke-width="1" opacity="0.3"/>
</svg>
